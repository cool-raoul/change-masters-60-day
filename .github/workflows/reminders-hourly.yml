name: Hourly reminders push

# Elk uur wordt de reminders-endpoint op Vercel aangeroepen. De endpoint
# filtert zelf per user op basis van hun ingestelde tijdstip + tijdzone,
# dus hier hoeven we niets te weten over welke users waarvoor willen.
#
# GitHub Actions hourly cron is gratis (Vercel Hobby laat 'm niet toe),
# vandaar deze route. Op 't hele uur staat 't planningsvenster niet
# gegarandeerd strak (GitHub kan 'n paar minuten laat zijn tijdens piek),
# maar voor een ochtendherinnering is dat ruim voldoende.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Zorg dat er nooit twee runs tegelijk schieten — scheelt dubbele pushes
# als een run uitloopt.
concurrency:
  group: hourly-reminders
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping reminders endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://my-eleva.com/api/reminders/send
        run: |
          set -euo pipefail
          echo "Calling $ENDPOINT"
          # -f laat curl niet-2xx als fout zien; -sS onderdrukt progress
          # maar toont errors; --retry helpt bij transient Vercel hiccups.
          curl -fsS \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$ENDPOINT"

      - name: Ping freebie-mails endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://my-eleva.com/api/cron/freebie-mails
        run: |
          set -euo pipefail
          echo "Calling $ENDPOINT"
          # Freebie 5-mail-sequence. De endpoint stuurt alleen rijen waarvan
          # gepland_op (18:00 UTC + N dagen) al voorbij is, dus uurlijks pingen
          # is veilig: een dag-mail gaat 's avonds uit, de andere uren no-op.
          # Bewust hier i.p.v. Vercel-cron (Hobby is onbetrouwbaar) en single
          # source zodat mails niet dubbel verstuurd worden.
          curl -fsS \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$ENDPOINT"

      - name: Ping resetcode ochtend-seintjes endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://my-eleva.com/api/resetcode/ochtend-cron
        run: |
          set -euo pipefail
          echo "Calling $ENDPOINT"
          # Dagelijkse check-in-seintjes voor Resetcode-klanten. De
          # endpoint verstuurt zelf alleen rond 08:00 Europe/Amsterdam
          # en alleen naar klanten met push aan die nog niet inchecken;
          # alle andere uren is dit een no-op.
          curl -fsS \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$ENDPOINT"

      - name: Ping stilte-reminders endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://my-eleva.com/api/reminders/stilte
        run: |
          set -euo pipefail
          echo "Calling $ENDPOINT"
          # Tweede endpoint voor playbook-stilte-nudges. Filtert zelf
          # per member op lokaal uur+tijdzone (zelfde mechaniek als de
          # gewone ochtendherinnering). Pusht een vriendelijke nudge
          # naar de member en — bij 2+ dagen stilte — ook naar zijn
          # sponsor. Anti-spam zit in de endpoint zelf.
          curl -fsS \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$ENDPOINT"
